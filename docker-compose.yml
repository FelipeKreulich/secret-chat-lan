services:
  server:
    build: .
    container_name: ciphermesh-server
    ports:
      - "3600:3600"
    volumes:
      - ./certs:/app/certs
    environment:
      - PORT=3600
      - LOG_LEVEL=info
      - TLS=true
      # IP do host anunciado no banner (ex: IP Tailscale). Definido no .env.
      - ADVERTISE_IP=${ADVERTISE_IP:-}
    restart: unless-stopped
