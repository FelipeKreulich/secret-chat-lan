name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC — npm Trusted Publishing (no long-lived token)

jobs:
  release:
    name: Testar e publicar release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing over OIDC needs a recent npm (>= 11.5.1).
      - name: Atualizar npm
        run: npm install -g npm@latest

      - name: Instalar dependencias
        run: npm ci

      - name: Validar (lint + format + testes)
        run: npm run validate

      # Authenticates via OIDC — no token. Requires a Trusted Publisher for this
      # repo + workflow configured on npmjs.com. Provenance is added automatically.
      - name: Publicar no npm (Trusted Publishing)
        run: npm publish --access public

      - name: Publicar release no GitHub
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
