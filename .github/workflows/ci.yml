name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

# Cancel superseded runs on the same ref (e.g. new push to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, format e testes (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Formatacao
        run: npm run format:check

      - name: Testes
        run: npm test

      - name: Cobertura com piso (Node 22)
        if: matrix.node == '22'
        run: >-
          node --test --experimental-test-coverage
          --test-coverage-lines=65
          --test-coverage-functions=60
          --test-coverage-branches=60
          test/*.test.js

      - name: Auditoria de dependencias (high+)
        if: matrix.node == '22'
        run: npm audit --audit-level=high
